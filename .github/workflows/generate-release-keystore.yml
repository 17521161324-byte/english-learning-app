name: Generate Release Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Generate keystore
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          keytool -genkeypair \
            -v \
            -keystore english-learning-release.keystore \
            -storetype JKS \
            -alias "$ANDROID_KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            -dname "CN=English Learning App, OU=Personal, O=Personal, L=Shanghai, ST=Shanghai, C=CN"
          base64 -w 0 english-learning-release.keystore > android-keystore-base64.txt

      - name: Upload keystore base64
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore-base64
          path: android-keystore-base64.txt
          retention-days: 1
